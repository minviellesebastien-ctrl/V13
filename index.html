<!DOCTYPE html>
<html lang="fr">
<head>
  <script>
    try {
      if (localStorage.getItem("avenir-mode-confidentiel-v1") === "true") {
        document.documentElement.classList.add("privacy-boot");
      }
    } catch (error) {}
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ff4b0b">
  <meta name="description" content="Vue d’ensemble du patrimoine">
  <meta name="app-version" content="13.8.3">

  <title>AV€NIR - Patrimoine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

  
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon4-192.png">
  <link rel="apple-touch-icon" href="./icon4-192.png">
  <link rel="stylesheet" href="./style.css?v=13.9.3-repartition-visible">
</head>

<body>
  <div id="appSplash" class="app-splash" aria-hidden="true">
    <img src="./splash-logo.png" class="app-splash-logo" alt="">
  </div>
  <main class="app-shell">
    <section class="dashboard">

      <article class="total-card">
        <p class="total-label">TOTAL PATRIMOINE</p>
        <div id="totalAmount" class="total-amount">0,00 €</div>

        <button
          id="privacyToggleButton"
          class="privacy-toggle-button"
          type="button"
          aria-label="Masquer les montants"
          aria-pressed="false"
          title="Masquer les montants"
        >
          <svg class="privacy-eye privacy-eye-open" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>

          <svg class="privacy-eye privacy-eye-closed" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 3l18 18"></path>
            <path d="M10.6 6.2A10.7 10.7 0 0 1 12 6c6 0 9.5 6 9.5 6a17 17 0 0 1-2.1 2.8"></path>
            <path d="M6.2 6.2C3.9 7.8 2.5 12 2.5 12s3.5 6 9.5 6c1.8 0 3.3-.5 4.6-1.2"></path>
            <path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"></path>
          </svg>
        </button>
      </article>

      <header class="brand-strip">
        <img class="brand-logo" src="./logo-avenir.png" alt="Logo AV€NIR">

        <div class="brand-copy">
          <h1>AV€NIR</h1>
          <p>Vue d’ensemble du patrimoine</p>
        </div>

        <div class="brand-actions" aria-label="Actions du bandeau">
          <button id="openStatsButton" class="header-icon-button" type="button" aria-label="Répartition du patrimoine">
            <svg class="header-action-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M11 3a8 8 0 1 0 8 8h-8V3Z"></path>
              <path d="M14 3.5A8 8 0 0 1 20.5 10H14V3.5Z"></path>
            </svg>
          </button>
          <button id="openSettingsButton" class="header-icon-button settings-button" type="button" aria-label="Modifier les comptes">
            <svg class="header-action-icon settings-svg" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="3.4"></circle>
              <path d="M19.4 13.3c.06-.42.1-.85.1-1.3s-.04-.88-.1-1.3l2-1.55-1.9-3.3-2.45 1a8.4 8.4 0 0 0-2.25-1.3L14.45 3h-4.9l-.35 2.55a8.4 8.4 0 0 0-2.25 1.3l-2.45-1-1.9 3.3 2 1.55c-.06.42-.1.85-.1 1.3s.04.88.1 1.3l-2 1.55 1.9 3.3 2.45-1a8.4 8.4 0 0 0 2.25 1.3l.35 2.55h4.9l.35-2.55a8.4 8.4 0 0 0 2.25-1.3l2.45 1 1.9-3.3-2-1.55Z"></path>
            </svg>
          </button>
        </div>
      </header>

      <section id="accountsList" class="accounts-list" aria-label="Liste des comptes"></section>

      <footer class="footer">
        <span class="footer-lock" aria-hidden="true">🔒</span>
        <span>Données sauvegardées automatiquement</span>
        <span class="footer-separator">•</span>
        <span id="lastUpdated">—</span>
      </footer>

    </section>
  </main>

  <div id="settingsOverlay" class="settings-overlay" hidden>
    <section class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="sheet-handle" aria-hidden="true"></div>

      <header class="settings-header">
        <div>
          <p class="settings-eyebrow">AV€NIR</p>
          <h2 id="settingsTitle">Modifier les comptes</h2>
        </div>

        <button
          id="closeSettingsButton"
          class="close-settings-button"
          type="button"
          aria-label="Fermer les paramètres"
        >
          ×
        </button>
      </header>

      <div id="settingsAccounts" class="settings-accounts"></div>

      <div class="settings-actions settings-actions-v13">
        <button id="addAccountButton" class="settings-action-button add-account-button" type="button">
          <span class="settings-action-symbol" aria-hidden="true">＋</span>
          <span>Ajouter</span>
        </button>

        <button id="exportAccountsButton" class="settings-action-button transfer-account-button" type="button" aria-label="Exporter les données AV€NIR">
          <span class="settings-action-symbol" aria-hidden="true">↑</span>
          <span>Exporter</span>
        </button>

        <button id="importAccountsButton" class="settings-action-button transfer-account-button" type="button" aria-label="Importer une sauvegarde AV€NIR">
          <span class="settings-action-symbol" aria-hidden="true">↓</span>
          <span>Importer</span>
        </button>

        <button id="saveSettingsButton" class="settings-action-button save-settings-button" type="button">
          <span class="settings-action-symbol" aria-hidden="true">✓</span>
          <span>Enregistrer</span>
        </button>
      </div>
      <input id="importAccountsInput" type="file" accept="application/json,.json" hidden>
    </section>
  </div>


  <div id="statsOverlay" class="stats-overlay" hidden>
    <section class="stats-panel" role="dialog" aria-modal="true" aria-labelledby="statsTitle">
      <header class="stats-header">
        <div class="stats-title-wrap">
          <svg class="stats-title-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M11 3a8 8 0 1 0 8 8h-8V3Z"></path>
            <path d="M14 3.5A8 8 0 0 1 20.5 10H14V3.5Z"></path>
          </svg>
          <div><p class="stats-eyebrow">AV€NIR</p><h2 id="statsTitle">Répartition du patrimoine</h2></div>
        </div>
        <button id="closeStatsButton" class="close-stats-button" type="button" aria-label="Fermer">×</button>
      </header>
      <div class="stats-content">
        <div class="donut-stage">
          <canvas id="assetDonutCanvas" width="620" height="620"></canvas>
          <div class="donut-center-copy"><span>TOTAL</span><strong id="donutTotal">0,00 €</strong><small>100 %</small></div>
        </div>
        <div id="donutLegend" class="donut-legend"></div>
      </div>
    </section>
  </div>

  <template id="accountCardTemplate">
    <article class="account-card">
      <div class="account-icon-wrap">
        <img class="account-icon" src="" alt="">
      </div>

      <div class="account-main">
        <div class="account-name"></div>
      </div>

      <div class="account-value">
        <span class="account-amount"></span>
        <span class="currency">€</span>
      </div>
</article>
  </template>

  <template id="settingsAccountTemplate">
    <article class="settings-account-row">
      <button
        class="drag-handle"
        type="button"
        aria-label="Maintenir pour déplacer ce compte"
      >☰</button>

      <div class="settings-name-line">
        <img class="settings-account-icon" src="" alt="" aria-hidden="true">
        <input class="name-input" type="text" autocomplete="off" aria-label="Nom du compte">
        <button class="delete-account-button" type="button" aria-label="Supprimer ce compte" title="Supprimer ce compte">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7h16"></path>
            <path d="M10 11v6"></path>
            <path d="M14 11v6"></path>
            <path d="M6 7l1 14h10l1-14"></path>
            <path d="M9 7V4h6v3"></path>
          </svg>
        </button>
      </div>

      <div class="settings-field amount-field">
        <div class="amount-input-wrapper">
          <input class="amount-input" type="text" inputmode="decimal" autocomplete="off" aria-label="Montant">
        </div>
      </div>
    </article>
  </template>

  <!-- V12.3 Premium Lock Screen -->
  <div id="pinLockScreen" class="pin-lock-screen" hidden>
    <div class="pin-lock-glow pin-lock-glow-one" aria-hidden="true"></div>
    <div class="pin-lock-glow pin-lock-glow-two" aria-hidden="true"></div>

    <section class="pin-lock-card" role="dialog" aria-modal="true" aria-labelledby="pinLockTitle" aria-describedby="pinLockMessage">
      <div class="pin-brand" aria-label="">AV€NIR</div>

      <div class="pin-security-label" aria-hidden="true">
        <span class="pin-security-dot"></span>
        
      </div>

      <div class="pin-lock-emblem" aria-hidden="true">
        <svg class="pin-lock-icon" viewBox="0 0 96 96" width="76" height="76" focusable="false">
          <circle class="pin-lock-halo" cx="48" cy="48" r="44" fill="none" stroke="rgba(255,255,255,.22)" stroke-width="2"/>
          <path class="pin-lock-shackle" d="M31 43V31c0-10 7.6-18 17-18s17 8 17 18v12" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
          <rect class="pin-lock-body" x="22" y="40" width="52" height="42" rx="13" fill="rgba(255,255,255,.16)" stroke="#fff" stroke-width="5"/>
          <circle class="pin-lock-keyhole" cx="48" cy="58" r="5" fill="#fff"/>
          <path class="pin-lock-keyhole" d="M48 63v8" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          <path class="pin-lock-success" d="M36 59l8 8 17-19" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <div class="pin-lock-copy">
        <p class="pin-lock-eyebrow"></p>
        <h2 id="pinLockTitle"></h2>
        <p id="pinLockMessage" class="pin-lock-message" aria-live="polite">Entrez votre code à 6 chiffres</p>
      </div>

      <div id="pinDots" class="pin-dots" role="status" aria-label="Code saisi : 0 chiffre sur 6">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </div>

      <div class="pin-keypad-mount" aria-hidden="true"></div>
      <p class="pin-local-note"></p>
    </section>
  </div>

  <script src="./script.js?v=13.9.2-demarrage-confidentiel"></script>
</body>
</html>
